backend:
  name: github
  repo: iamtouha/tui-portfolio
  branch: main
  base_url: http://localhost:3000
  auth_endpoint: api/decap/auth

local_backend: true
publish_mode: editorial_workflow
site_url: http://localhost:3000
display_url: http://localhost:3000
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: portfolio
    label: Portfolio
    files:
      - name: profile
        label: Profile
        file: src/features/portfolio-tui/data/content/profile.json
        format: json
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Handle, name: handle, widget: string }
          - { label: Role, name: role, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Timezone, name: timezone, widget: string }
          - { label: Tagline, name: tagline, widget: text }
      - name: featured
        label: Featured Posts/Projects
        file: src/features/portfolio-tui/data/content/featured.json
        format: json
        fields:
          - label: Featured Posts
            name: featuredPosts
            widget: relation
            collection: posts
            multiple: true
            search_fields: [title]
            display_fields: [title]
            value_field: "{{slug}}"
          - label: Featured Projects
            name: featuredProjects
            widget: relation
            collection: projects
            multiple: true
            search_fields: [name]
            display_fields: [name]
            value_field: "{{slug}}"
      - name: experience
        label: Experience
        file: src/features/portfolio-tui/data/content/experience.json
        format: json
        fields:
          - label: Positions
            name: items
            widget: list
            summary: "{{fields.role}} at {{fields.co}}"
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Company, name: co, widget: string }
              - { label: When, name: when, widget: string }
              - { label: Description, name: desc, widget: text }
              - {
                  label: Highlights,
                  name: highlights,
                  widget: list,
                  field: { label: Highlight, name: highlight, widget: string },
                }
              - {
                  label: Stack,
                  name: stack,
                  widget: list,
                  field: { label: Tool, name: tool, widget: string },
                }
      - name: skills
        label: Skills
        file: src/features/portfolio-tui/data/content/skills.json
        format: json
        fields:
          - label: Skill Groups
            name: groups
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Name, name: name, widget: string }
              - {
                  label: Items,
                  name: items,
                  widget: list,
                  field: { label: Skill, name: skill, widget: string },
                }
      - name: socials
        label: Socials
        file: src/features/portfolio-tui/data/content/socials.json
        format: json
        fields:
          - label: Links
            name: items
            widget: list
            summary: "{{fields.display}}"
            fields:
              - {
                  label: Key,
                  name: key,
                  widget: select,
                  options: [email, github, linkedin, twitter, fiverr, website],
                }
              - { label: Display, name: display, widget: string }
              - { label: URL, name: href, widget: string }
  - name: projects
    label: Projects
    label_singular: Project
    description: >
      Selected portfolio projects shown in the terminal UI.
    folder: src/features/portfolio-tui/data/content/projects
    identifier_field: name
    extension: json
    format: json
    slug: "{{slug}}"
    summary: "{{name}} -- {{year}}"
    create: true
    editor:
      visualEditing: true
    sortable_fields:
      - name
      - year
    view_groups:
      - label: Year
        field: year
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Summary, name: summary, widget: string }
      - { label: Body, name: body, widget: markdown }
      - { label: Role, name: role, widget: string }
      - { label: Year, name: year, widget: string }
      - { label: Repo/Project URL, name: url, widget: string }
      - {
          label: Features,
          name: features,
          widget: list,
          field: { label: Feature, name: feature, widget: string },
        }
      - {
          label: Tags,
          name: tags,
          widget: list,
          field: { label: Tag, name: tag, widget: string },
        }

  - name: posts
    label: Posts
    label_singular: Post
    description: >
      Published writing links shown in the terminal UI.
    folder: src/features/portfolio-tui/data/content/posts
    identifier_field: title
    extension: json
    format: json
    slug: "{{slug}}"
    summary: "{{title}}"
    create: true
    editor:
      visualEditing: true
    sortable_fields:
      - title
      - d
      - min
    view_groups:
      - label: Year
        field: d
        pattern: \d{4}
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: string }
      - { label: Cover Image, name: cover, widget: image }
      - { label: Summary, name: summary, widget: text }
      - { label: Body, name: body, widget: markdown }
      - label: Related Posts
        name: relatedPosts
        widget: relation
        collection: posts
        multiple: true
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
        required: false
